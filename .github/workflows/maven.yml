name: Java CI with Maven

on:
  push:
    branches: [ "main", "part2" ]

  pull_request:
    branches: [ "main", "part2" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'

    - name: Build and Test with Maven
      run: mvn test
